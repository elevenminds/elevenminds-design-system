  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 --em-blue-soft:     #E8EBFD;   /* washes, tinted backgrounds               */\n  --em-ink:           #111111;   /* primary text / logo ink                  */\n  --em-ink-soft:      #2A2A2A;   /* heavy body                               */\n\n  /* ---------- Neutrals (warm-leaning gray scale) ---------- */\n  --em-gray-50:       #FAFAFA;\n  --em-gray-100:      #F2F2F2;\n  --em-gray-200:      #E5E5E5;   /* icon roundel background                    */\n  --em-gray-300:      #D4D4D4;\n  --em-gray-400:      #A3A3A3;\n  --em-gray-500:      #737373;\n  --em-gray-600:      #525252;\n  --em-gray-700:      #404040;\n  --em-gray-800:      #262626;\n  --em-gray-900:      #171717;\n  --em-white:         #FFFFFF;\n\n  /* ---------- Semantic foreground / background ---------- */\n  --em-fg-1:          var(--em-ink);        /* primary text                   */\n  --em-fg-2:          var(--em-gray-600);   /* secondary text                 */\n  --em-fg-3:          var(--em-gray-400);   /* tertiary / placeholder         */\n  --em-fg-inverse:    var(--em-white);\n\n  --em-bg-1:          var(--em-white);      /* page                           */\n  --em-bg-2:          var(--em-gray-50);    /* subtle alt band                */\n  --em-bg-3:          var(--em-gray-100);   /* chip / card                    */\n  --em-bg-inverse:    var(--em-ink);\n\n  --em-border:        var(--em-gray-200);\n  --em-border-strong: var(--em-gray-300);\n  --em-divider:       var(--em-gray-100);\n\n  /* ---------- Status (used sparingly) ---------- */\n  --em-success:       #2E8B57;\n  --em-warning:       #E0A800;\n  --em-danger:        #D7263D;\n  --em-info:          var(--em-blue);  /* info state reuses brand blue */\n\n  /* ---------- Type families ---------- */\n  --em-font-sans:     'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;\n  --em-font-mono:     'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* ---------- Type scale ---------- */\n  --em-fs-display:    clamp(48px, 6vw, 88px);\n  --em-fs-h1:         clamp(36px, 4vw, 56px);\n  --em-fs-h2:         clamp(28px, 3vw, 40px);\n  --em-fs-h3:         22px;\n  --em-fs-h4:         18px;\n  --em-fs-body:       16px;\n  --em-fs-small:      14px;\n  --em-fs-caption:    12px;\n  --em-fs-micro:      11px;\n\n  --em-lh-tight:      1.05;\n  --em-lh-heading:    1.15;\n  --em-lh-body:       1.55;\n  --em-lh-loose:      1.7;\n\n  --em-tracking-tight:  -0.02em;\n  --em-tracking-normal: 0;\n  --em-tracking-wide:   0.08em;   /* small-caps labels, eyebrows */\n\n  /* ---------- Spacing (4px base) ---------- */\n  --em-sp-0:  0;\n  --em-sp-1:  4px;\n  --em-sp-2:  8px;\n  --em-sp-3:  12px;\n  --em-sp-4:  16px;\n  --em-sp-5:  24px;\n  --em-sp-6:  32px;\n  --em-sp-7:  48px;\n  --em-sp-8:  64px;\n  --em-sp-9:  96px;\n  --em-sp-10: 128px;\n\n  /* ---------- Radii ---------- */\n  --em-radius-sm:    4px;\n  --em-radius-md:    8px;\n  --em-radius-lg:    16px;\n  --em-radius-pill:  999px;\n  --em-radius-round: 50%;     /* icon roundels, avatars */\n\n  /* ---------- Elevation ---------- */\n  --em-shadow-0: none;\n  --em-shadow-1: 0 1px 2px rgba(17,17,17,0.06), 0 1px 1px rgba(17,17,17,0.04);\n  --em-shadow-2: 0 4px 12px rgba(17,17,17,0.08), 0 1px 2px rgba(17,17,17,0.04);\n  --em-shadow-3: 0 12px 32px rgba(17,17,17,0.12), 0 2px 6px rgba(17,17,17,0.06);\n\n  /* ---------- Motion ---------- */\n  --em-ease-out:     cubic-bezier(0.22, 0.61, 0.36, 1);\n  --em-ease-in-out:  cubic-bezier(0.65, 0.05, 0.36, 1);\n  --em-dur-fast:     120ms;\n  --em-dur-med:      220ms;\n  --em-dur-slow:     420ms;\n}\n\n/* ============================================================\n   Base\n   ============================================================ */\n\nhtml, body {\n  font-family: var(--em-font-sans);\n  font-size: var(--em-fs-body);\n  line-height: var(--em-lh-body);\n  color: var(--em-fg-1);\n  background: var(--em-bg-1);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ============================================================\n   Semantic typography\n   ============================================================ */\n\n.em-display,\nh1.em-display {\n  font-size: var(--em-fs-display);\n  line-height: var(--em-lh-tight);\n  font-weight: 700;\n  letter-spacing: var(--em-tracking-tight);\n  color: var(--em-fg-1);\n}\n\n.em-h1, h1 {\n  font-size: var(--em-fs-h1);\n  line-height: var(--em-lh-heading);\n  font-weight: 700;\n  letter-spacing: var(--em-tracking-tight);\n}\n\n.em-h2, h2 {\n  font-size: var(--em-fs-h2);\n  line-height: var(--em-lh-heading);\n  font-weight: 600;\n  letter-spacing: var(--em-tracking-tight);\n}\n\n.em-h3, h3 {\n  font-size: var(--em-fs-h3);\n  line-height: var(--em-lh-heading);\n  font-weight: 600;\n}\n\n.em-h4, h4 {\n  font-size: var(--em-fs-h4);\n  line-height: var(--em-lh-heading);\n  font-weight: 600;\n}\n\n.em-body, p {\n  font-size: var(--em-fs-body);\n  line-height: var(--em-lh-body);\n  color: var(--em-fg-1);\n}\n\n.em-body-lg {\n  font-size: 18px;\n  line-height: var(--em-lh-body);\n}\n\n.em-small, small {\n  font-size: var(--em-fs-small);\n  color: var(--em-fg-2);\n}\n\n.em-caption {\n  font-size: var(--em-fs-caption);\n  color: var(--em-fg-2);\n  line-height: 1.4;\n}\n\n.em-eyebrow {\n  font-size: var(--em-fs-micro);\n  text-transform: uppercase;\n  letter-spacing: var(--em-tracking-wide);\n  font-weight: 600;\n  color: var(--em-fg-2);\n}\n\n.em-code, code {\n  font-family: var(--em-font-mono);\n  font-size: 0.92em;\n  background: var(--em-bg-3);\n  padding: 1px 6px;\n  border-radius: var(--em-radius-sm);\n}\n\n/* em-hand utility removed — brand no longer uses a handwritten face.\n   Use .em-mono or a small uppercase Inter label instead. */\n\n/* ============================================================\n   Utility\n   ============================================================ */\n\n.em-accent-blue { background: var(--em-blue); color: var(--em-white); }\n.em-accent-blue-soft { background: var(--em-blue-soft); color: var(--em-ink); }\n.em-accent-ink  { background: var(--em-ink); color: var(--em-white); }\n\n/* em-highlight — inline editorial highlight for a word of running copy.\n   Use on a <span>. Produces a clean bottom-60% blue wash. */\n.em-highlight {\n  background: linear-gradient(transparent 55%, var(--em-blue-soft) 55%);\n  padding: 0 2px;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   sub_systems — shared chrome\n   ------------------------------------------------------------\n   Layout & component primitives shared by every distributor\n   brand sheet. Each sub-system loads:\n     1. ../colors_and_type.css   (elevenminds base tokens)\n     2. ./tokens.css             (sub-brand overrides)\n     3. ../sub_systems/_subsystem.css\n   ============================================================ */\n\n* { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  background: var(--em-bg-1);\n  color: var(--em-fg-1);\n  font-family: var(--sb-font-sans, var(--em-font-sans));\n  font-size: var(--em-fs-body);\n  line-height: var(--em-lh-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.sb-page {\n  max-width: 1280px;\n  margin: 0 auto;\n  padding: 48px 32px 96px;\n}\n\n/* ---------- Top bar ---------- */\n.sb-top {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding-bottom: 24px;\n  border-bottom: 1px solid var(--em-border);\n  margin-bottom: 40px;\n}\n.sb-top .sb-crumb {\n  font-size: 12px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--em-fg-2);\n}\n.sb-top .sb-crumb a { color: inherit; text-decoration: none; }\n.sb-top .sb-crumb a:hover { color: var(--sb-primary, var(--em-ink)); }\n\n.sb-lockup {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.sb-lockup img { height: 28px; display: block; }\n.sb-lockup-divider {\n  width: 1px; height: 20px; background: var(--em-border);\n}\n.sb-lockup .em-mark {\n  font-family: var(--em-font-sans);\n  font-size: 12px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--em-fg-2);\n}\n\n/* ---------- Hero ---------- */\n.sb-hero {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: 48px;\n  align-items: end;\n  padding-bottom: 48px;\n  border-bottom: 1px solid var(--em-border);\n  margin-bottom: 48px;\n}\n.sb-hero .sb-eyebrow {\n  font-size: 12px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--sb-primary, var(--em-ink));\n  font-weight: 600;\n  margin-bottom: 16px;\n}\n.sb-hero h1 {\n  font-family: var(--sb-font-display, var(--sb-font-sans, var(--em-font-sans)));\n  font-size: clamp(48px, 6vw, 84px);\n  font-weight: 700;\n  line-height: 1.02;\n  letter-spacing: -0.025em;\n  margin: 0 0 16px 0;\n  color: var(--em-ink);\n}\n.sb-hero p.sb-lede {\n  font-size: 18px;\n  line-height: 1.5;\n  color: var(--em-fg-2);\n  max-width: 56ch;\n  margin: 0;\n}\n.sb-hero .sb-mark-display {\n  width: 200px;\n  height: 200px;\n  display: grid;\n  place-items: center;\n  background: var(--sb-mark-bg, var(--em-bg-3));\n  color: var(--sb-mark-fg, var(--sb-primary));\n  border-radius: var(--sb-radius-mark, 0);\n}\n.sb-hero .sb-mark-display img { width: 75%; }\n.sb-hero .sb-mark-display svg { width: 75%; height: auto; }\n\n/* ---------- Section scaffolding ---------- */\n.sb-section { margin-bottom: 64px; }\n.sb-section-head {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  padding-bottom: 16px;\n  border-bottom: 1px solid var(--em-border);\n  margin-bottom: 24px;\n}\n.sb-section-head h2 {\n  font-family: var(--sb-font-sans, var(--em-font-sans));\n  font-size: 24px;\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n.sb-section-head .sb-tag {\n  font-size: 11px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--em-fg-2);\n}\n\n/* ---------- Color row ---------- */\n.sb-colors {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: 12px;\n}\n.sb-swatch {\n  border: 1px solid var(--em-border);\n  border-radius: var(--sb-radius-card, 4px);\n  overflow: hidden;\n  background: #fff;\n}\n.sb-swatch-chip {\n  height: 96px;\n  display: block;\n  position: relative;\n}\n.sb-swatch-chip::after {\n  content: attr(data-role);\n  position: absolute;\n  bottom: 8px; left: 10px;\n  font-size: 10px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.85);\n  background: rgba(0,0,0,0.18);\n  padding: 2px 6px;\n  border-radius: 2px;\n}\n.sb-swatch-chip[data-tone=\"light\"]::after { color: rgba(0,0,0,0.6); background: rgba(255,255,255,0.5); }\n.sb-swatch-meta {\n  padding: 10px 12px;\n  font-size: 12px;\n  display: flex;\n  justify-content: space-between;\n  gap: 8px;\n}\n.sb-swatch-meta strong { font-weight: 600; }\n.sb-swatch-meta code {\n  font-family: var(--em-font-mono);\n  font-size: 11px;\n  color: var(--em-fg-2);\n}\n\n/* ---------- Type specimen ---------- */\n.sb-type {\n  display: grid;\n  gap: 16px;\n}\n.sb-type-row {\n  display: grid;\n  grid-template-columns: 120px 1fr;\n  gap: 24px;\n  padding: 16px 0;\n  border-top: 1px solid var(--em-divider);\n  align-items: baseline;\n}\n.sb-type-row:first-child { border-top: none; }\n.sb-type-row .sb-type-meta {\n  font-size: 12px;\n  color: var(--em-fg-2);\n  font-family: var(--em-font-mono);\n}\n.sb-type-row .sb-type-sample {\n  color: var(--em-ink);\n}\n\n/* ---------- Cards / two-up ---------- */\n.sb-grid-2 {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 24px;\n}\n.sb-grid-3 {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 16px;\n}\n.sb-card {\n  border: 1px solid var(--em-border);\n  border-radius: var(--sb-radius-card, 4px);\n  padding: 24px;\n  background: #fff;\n}\n.sb-card h3 {\n  font-size: 16px;\n  font-weight: 600;\n  margin: 0 0 8px 0;\n}\n.sb-card p {\n  margin: 0;\n  font-size: 14px;\n  color: var(--em-fg-2);\n  line-height: 1.5;\n}\n\n/* ---------- Buttons ---------- */\n.sb-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 10px 18px;\n  font: 500 14px/1 var(--sb-font-sans, var(--em-font-sans));\n  border-radius: var(--sb-radius-btn, 4px);\n  border: 1px solid transparent;\n  cursor: pointer;\n  text-decoration: none;\n}\n.sb-btn-primary {\n  background: var(--sb-primary, var(--em-ink));\n  color: var(--sb-on-primary, #fff);\n}\n.sb-btn-secondary {\n  background: #fff;\n  color: var(--em-ink);\n  border-color: var(--em-border-strong);\n}\n\n/* ---------- Tag ---------- */\n.sb-tag-pill {\n  display: inline-block;\n  padding: 4px 10px;\n  font-size: 11px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  font-weight: 600;\n  border-radius: 999px;\n  background: var(--sb-primary-soft, var(--em-bg-3));\n  color: var(--sb-primary, var(--em-ink));\n}\n\n/* ---------- Footer ---------- */\n.sb-foot {\n  margin-top: 80px;\n  padding-top: 24px;\n  border-top: 1px solid var(--em-border);\n  font-size: 12px;\n  color: var(--em-fg-2);\n  display: flex;\n  justify-content: space-between;\n}\n.sb-foot a { color: inherit; }\n<\u002Fstyle>\n<style>/* ============================================================\n   NAANIX — sub-system tokens\n   ------------------------------------------------------------\n   Fleet operations platform. Distributor-branded surface of\n   the elevenminds RTLS platform. Map-first, alert-driven,\n   high data density. Spanish-language by default.\n   ============================================================ */\n\n/* vietnamese */\n@font-face {\n  font-family: 'Barlow';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"8068da9e-fa3a-4bca-8c1e-6f05bc9cd1c7\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Barlow';\n  font-sty   display: flex; flex-direction: column; align-items: flex-start; gap: 0;\n    background: #fff; border: 1px solid var(--nx-border);\n    padding: 24px; min-width: 220px;\n  }\n  .nx-lockup img { height: 48px; }\n  .nx-lockup .nx-attrib {\n    margin-top: 16px; padding-top: 12px;\n    border-top: 1px solid var(--nx-border);\n    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--nx-slate-2); width: 100%;\n  }\n  .nx-attrib em { color: var(--nx-red); font-style: normal; font-weight: 600; }\n\n  /* Alert ladder demo */\n  .nx-alert-stack { display: flex; gap: 0; align-items: stretch; height: 240px; }\n  .nx-alert-col {\n    flex: 1; display: flex; flex-direction: column; align-items: center;\n    padding: 14px 8px; color: #fff; position: relative;\n    font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 11px;\n    letter-spacing: 0.12em; text-transform: uppercase;\n  }\n  .nx-alert-col span.lab {\n    writing-mode: vertical-rl; transform: rotate(180deg);\n    font-size: 11px; letter-spacing: 0.2em;\n  }\n  .nx-alert-col span.cnt { font-size: 22px; letter-spacing: 0; margin-bottom: 10px; }\n\n  /* Truck list demo */\n  .nx-list {\n    border: 1px solid var(--nx-border); border-radius: 2px;\n    background: #fff;\n    font-family: 'Inter', sans-serif;\n    font-size: 12px;\n  }\n  .nx-list-head {\n    display: grid; grid-template-columns: 60px 60px 1fr 90px 60px;\n    gap: 12px; padding: 10px 14px;\n    background: var(--nx-bg-data);\n    border-bottom: 1px solid var(--nx-border);\n    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--nx-slate-2);\n  }\n  .nx-row {\n    display: grid; grid-template-columns: 60px 60px 1fr 90px 60px;\n    gap: 12px; padding: 9px 14px; align-items: center;\n    border-bottom: 1px solid var(--nx-border);\n  }\n  .nx-row:last-child { border-bottom: none; }\n  .nx-time { font-family: var(--em-font-mono); color: var(--nx-slate-2); }\n  .nx-tag-time {\n    display -unit\">T-569<\u002Fspan>\n            <span class=\"nx-loc\">Calle Jazmines, Tlalnepantla de Baz<\u002Fspan>\n            <span class=\"nx-status stop\">Detenido<\u002Fspan>\n            <span class=\"nx-batt\">41%<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin-top: 12px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--nx-slate-2);\">Lista de unidades · denso<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Vehicle popup + radial menu -->\n      <div style=\"display: flex; flex-direction: column; gap: 24px; align-items: flex-start;\">\n        <div class=\"nx-popup\">\n          <div class=\"nx-popup-head\">\n            <span>T-448 · Flotilla 2<\u002Fspan>\n            <span style=\"opacity: 0.7;\">28/04 12:31<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"nx-popup-row\"><span class=\"k\">Velocidad<\u002Fspan><span class=\"v\">64 km/h<\u002Fspan><\u002Fdiv>\n          <div class=\"nx-popup-row\"><span class=\"k\">Operador<\u002Fspan><span class=\"v\">Buscando…<\u002Fspan><\u002Fdiv>\n          <div class=\"nx-popup-row\"><span class=\"k\">Odómetro<\u002Fspan><span class=\"v\">792 075.6 km<\u002Fspan><\u002Fdiv>\n          <div class=\"nx-popup-row\"><span class=\"k\">Sitio<\u002Fspan><span class=\"v\">Al Sur, 2.815 kms de Texcoco<\u002Fspan><\u002Fdiv>\n          <div class=\"nx-popup-row\"><span class=\"k\">Posición<\u002Fspan><span class=\"v\" style=\"font-family: var(--em-font-mono); font-size: 11px;\">19.4618, −98.9282<\u002Fspan><\u002Fdiv>\n          <div class=\"nx-popup-batt\"><i style=\"width: 95%;\"><\u002Fi><\u002Fdiv>\n          <div class=\"nx-popup-row\"><span class=\"k\">Batería<\u002Fspan><span class=\"v\">95%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 32px; display: grid; grid-template-columns: 280px 1fr; gap: 48px; align-items: center;\">\n      <div class=\"nx-radial\" aria-label=\"Acciones rápidas\"><\u002Fdiv>\n      <div>\n        <h3 style=\"font: 700 20px/1.2 'Barlow', sans-serif; color: var(--nx-slate); margin: 0 0 8px;\">Menú radial — acciones rápidas<\u002Fh3>\n        <p style=\"margin: 0; color: var(--nx-slate-2); font-size: 14px; max-width: 50ch;\">\n          Five quadrants on a 280-px wheel. Each color from the alert ladder maps to one action category — the operator's muscle memory matches their alert color memory.\n        <\u002Fp>\n        <ul style=\"margin: 16px 0 0 0; padding: 0; list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; font-size: 13px; color: #282E35;\">\n          <li style=\"display:flex; align-items:center; gap:10px;\"><i style=\"display:inline-block; width:14px; height:14px; background-color:#F08A1F; border-radius:2px;\"><\u002Fi>Comunicación<\u002Fli>\n          <li style=\"display:flex; align-items:center; gap:10px;\"><i style=\"display:inline-block; width:14px; height:14px; background-color:#F5C518; border-radius:2px;\"><\u002Fi>Configuración<\u002Fli>\n          <li style=\"display:flex; align-items:center; gap:10px;\"><i style=\"display:inline-block; width:14px; height:14px; background-color:#2E8B57; border-radius:2px;\"><\u002Fi>Recorridos<\u002Fli>\n          <li style=\"display:flex; align-items:center; gap:10px;\"><i style=\"display:inline-block; width:14px; height:14px; background-color:#2C8A8C; border-radius:2px;\"><\u002Fi>Reportes<\u002Fli>\n          <li style=\"display:flex; align-items:center; gap:10px;\"><i style=\"display:inline-block; width:14px; height:14px; background-color:#D6266D; border-radius:2px;\"><\u002Fi>Hoy<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ICONOGRAPHY -->\n  <div class=\"sb-section\">\n    <div class=\"sb-section-head\">\n      <h2>Iconography<\u002Fh2>\n      <span class=\"sb-tag\">Naanix layer over the elevenminds icon set<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size: 14px; color: var(--nx-slate-2); margin: 0 0 20px; max-width: 70ch;\">\n      NAANIX uses the full elevenminds icon library but in <strong>solid circular tiles<\u002Fstrong> rather than the outline roundels — denser, more affirmative, sized 40–48px in the toolbar. Red tiles signal destructive or alert actions; slate tiles for navigation; outlined tiles for secondary tools.\n    <\u002Fp>\n    <div style=\"display: flex; gap: 16px; flex-wrap: wrap;\">\n      <div class=\"nx-icon-tile\"><svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12l9-9 9 9\"><\u002Fpath><path d=\"M5 10v10h14V10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"nx-icon-tile\"><svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><path d=\"M12 2c-4 0-7 3-7 7 0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"nx-icon-tile\"><svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"nx-icon-tile red\"><svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2L2 22h20L12 2z\"><\u002Fpath><path d=\"M12 9v6\"><\u002Fpath><circle cx=\"12\" cy=\"18\" r=\"0.8\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n      <div class=\"nx-icon-tile red\"><svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 13h2l2-7h8l2 4h4v3\"><\u002Fpath><circle cx=\"7.5\" cy=\"17\" r=\"2\"><\u002Fcircle><circle cx=\"17\" cy=\"17\" r=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n      <div class=\"nx-icon-tile alt\"><svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h0a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8 1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MARKETING -->\n  <div class=\"sb-section\">\n    <div class=\"sb-section-head\">\n      <h2>Marketing surface<\u002Fh2>\n      <span class=\"sb-tag\">Web hero · partner sales<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"nx-marketing\">\n      <div>\n        <div class=\"nx-eyebrow\" style=\"color: rgba(255,255,255,0.72); margin-bottom: 16px;\">RTLS · Transporte · MX<\u002Fdiv>\n        <h3>Cada vehículo, <em>en su lugar.<\u002Fem><br>Cada minuto, contado.<\u002Fh3>\n        <p>NAANIX gives transportation operators across Mexico real-time visibility over their fleet — geofencing, alert ladders and route history without leaving the map.<\u002Fp>\n        <a class=\"sb-btn sb-btn-primary\" href=\"#\" style=\"background: var(--nx-red);\">Demostración<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"stat-grid\">\n        <div>\n          <div class=\"stat\">3.4M<\u002Fdiv>\n          <label>Eventos GPS / día<\u002Flabel>\n        <\u002Fdiv>\n        <div>\n          <div class=\"stat\">128<\u002Fdiv>\n          <label>Flotas activas<\u002Flabel>\n        <\u002Fdiv>\n        <div>\n          <div class=\"stat\">99.96%<\u002Fdiv>\n          <label>Uptime trimestral<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- VOICE -->\n  <div class=\"sb-section\">\n    <div class=\"sb-section-head\">\n      <h2>Voice<\u002Fh2>\n      <span class=\"sb-tag\">Spanish-first · operator tone<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sb-grid-3\">\n      <div class=\"sb-card\">\n        <h3>Direct, in present tense<\u002Fh3>\n        <p>\"Unidad T-454 fuera de ruta a las 11:38.\" Not \"We've detected that unit T-454 may have left its assigned route.\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sb-card\">\n        <h3>Operator vocabulary<\u002Fh3>\n        <p>Flotilla, recorrido, parada, geocerca, posta, telefonema. Avoid translated SaaS-isms (no \"engagement\", no \"dashboard\").<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sb-card\">\n        <h3>Alerts use the ladder, not adjectives<\u002Fh3>\n        <p>Color carries severity. Copy stays factual: \"Velocidad 86 km/h. Límite 80.\" No \"uh-oh\", no \"we noticed\".<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sb-foot\">\n    <span>NAANIX · sub-system of <a href=\"../../README.md\">elevenminds<\u002Fa><\u002Fspan>\n    <span>v0.1 · April 2026<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
