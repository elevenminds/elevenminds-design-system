<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--em-font-sans);}
  .row{display:grid;grid-template-columns:90px 1fr 140px;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--em-divider)}
  .tag{font-size:11px;color:#737373;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
  .meta{font-family:var(--em-font-mono);font-size:11px;color:#737373}
</style>
</head>
<body>
  <div class="row"><span class="tag">H1</span><span style="font-size:36px;font-weight:700;letter-spacing:-.02em">Innovation & technology hub</span><span class="meta">36 / 700</span></div>
  <div class="row"><span class="tag">H2</span><span style="font-size:28px;font-weight:600;letter-spacing:-.01em">Occupancy analytics</span><span class="meta">28 / 600</span></div>
  <div class="row"><span class="tag">H3</span><span style="font-size:22px;font-weight:600">Utilization by floor</span><span class="meta">22 / 600</span></div>
  <div class="row"><span class="tag">Body</span><span style="font-size:16px">Percentage of time a room is occupied.</span><span class="meta">16 / 400</span></div>
  <div class="row"><span class="tag">Small</span><span style="font-size:14px;color:#525252">Labor Day excluded.</span><span class="meta">14 / 400</span></div>
  <div class="row"><span class="tag">Caption</span><span style="font-size:12px;color:#525252">Monday–Friday, 7:00am–6:00pm ET.</span><span class="meta">12 / 400</span></div>
</body>
</html>
