<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:var(--em-font-sans); }
  .row { display:grid; grid-template-columns:repeat(10,1fr); gap:6px;}
  .sw { border-radius:6px; padding:10px 8px; height:90px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid var(--em-border);}
  .sw .n { font-weight:600; font-size:11px; }
  .sw .h { font-family:var(--em-font-mono); font-size:10px; opacity:.8; }
  .light { color:#111; } .dark { color:#fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:#FFFFFF"><span class="n">White</span><span class="h">#FFFFFF</span></div>
    <div class="sw light" style="background:#FAFAFA"><span class="n">50</span><span class="h">#FAFAFA</span></div>
    <div class="sw light" style="background:#F2F2F2"><span class="n">100</span><span class="h">#F2F2F2</span></div>
    <div class="sw light" style="background:#E5E5E5"><span class="n">200</span><span class="h">#E5E5E5</span></div>
    <div class="sw light" style="background:#D4D4D4"><span class="n">300</span><span class="h">#D4D4D4</span></div>
    <div class="sw light" style="background:#A3A3A3"><span class="n">400</span><span class="h">#A3A3A3</span></div>
    <div class="sw dark"  style="background:#737373"><span class="n">500</span><span class="h">#737373</span></div>
    <div class="sw dark"  style="background:#525252"><span class="n">600</span><span class="h">#525252</span></div>
    <div class="sw dark"  style="background:#262626"><span class="n">800</span><span class="h">#262626</span></div>
    <div class="sw dark"  style="background:#111111"><span class="n">Ink</span><span class="h">#111111</span></div>
  </div>
</body>
</html>
