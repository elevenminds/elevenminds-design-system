<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Type — Families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;}
  .fam{padding:12px 0;border-bottom:1px solid var(--em-divider)}
  .tag{font-size:11px;color:#737373;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:4px}
</style>
</head>
<body>
  <div class="fam">
    <div class="tag">Sans · Inter (Helvetica stand-in)</div>
    <div style="font-family:'Inter',sans-serif;font-size:26px;font-weight:500">The quick brown fox jumps · 0123456789</div>
  </div>
  <div class="fam" style="border:none">
    <div class="tag">Mono · JetBrains Mono (data + units)</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:22px">const floor = 3; // m² / user = 8.4</div>
  </div>
  <!-- handwritten accent face removed — brand now uses only Inter + JetBrains Mono -->
</body>
</html>
