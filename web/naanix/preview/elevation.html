<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#FAFAFA;font-family:var(--em-font-sans);display:flex;gap:22px;align-items:center}
  .card{width:110px;height:82px;background:#fff;border:1px solid #E5E5E5;border-radius:8px;display:flex;align-items:flex-end;justify-content:center;padding:8px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#525252}
  .s1{box-shadow:0 1px 2px rgba(17,17,17,0.06), 0 1px 1px rgba(17,17,17,0.04)}
  .s2{box-shadow:0 4px 12px rgba(17,17,17,0.08), 0 1px 2px rgba(17,17,17,0.04)}
  .s3{box-shadow:0 12px 32px rgba(17,17,17,0.12), 0 2px 6px rgba(17,17,17,0.06)}
</style>
</head>
<body>
  <div class="card s1">shadow-1</div>
  <div class="card s2">shadow-2</div>
  <div class="card s3">shadow-3</div>
</body>
</html>
