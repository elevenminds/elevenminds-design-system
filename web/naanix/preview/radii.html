<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--em-font-sans);display:flex;gap:16px;align-items:center}
  .box{width:84px;height:84px;background:#F2F2F2;border:1px solid #E5E5E5;display:flex;align-items:flex-end;justify-content:center;padding:8px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#525252}
</style>
</head>
<body>
  <div class="box" style="border-radius:4px">4</div>
  <div class="box" style="border-radius:8px">8</div>
  <div class="box" style="border-radius:16px">16</div>
  <div class="box" style="border-radius:999px;border-radius:50%">50%</div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#737373;margin-left:6px">
    sm · md · lg · round<br>
    Cards use md (8). Chips use pill. Roundels use 50%.
  </div>
</body>
</html>
