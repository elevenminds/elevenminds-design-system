<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--em-font-sans);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{font-family:inherit;font-size:14px;font-weight:500;padding:10px 16px;border-radius:8px;border:1px solid transparent;cursor:pointer;line-height:1}
  .primary{background:#111;color:#fff}
  .secondary{background:#fff;color:#111;border-color:#D4D4D4}
  .ghost{background:transparent;color:#111}
  .blue{background:#2847E0;color:#fff;border-color:#2847E0}
  .danger{background:#D7263D;color:#fff}
  .sm{font-size:12px;padding:6px 10px;border-radius:6px}
  .disabled{opacity:.45;cursor:not-allowed}
</style>
</head>
<body>
  <button class="btn primary">Primary</button>
  <button class="btn secondary">Secondary</button>
  <button class="btn ghost">Ghost</button>
  <button class="btn blue">Accent</button>
  <button class="btn danger">Danger</button>
  <button class="btn primary sm">Small</button>
  <button class="btn primary disabled">Disabled</button>
</body>
</html>
