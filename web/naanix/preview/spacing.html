<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--em-font-sans);}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-size:12px;color:#525252}
  .bar{background:#111;height:14px;border-radius:2px}
  .tok{width:80px;font-family:'JetBrains Mono',monospace;color:#111}
  .val{width:60px;text-align:right;color:#737373;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
  <div class="row"><span class="tok">sp-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="tok">sp-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="tok">sp-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="tok">sp-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="tok">sp-5</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="tok">sp-6</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="tok">sp-7</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="tok">sp-8</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
  <div class="row"><span class="tok">sp-9</span><div class="bar" style="width:96px"></div><span class="val">96px</span></div>
</body>
</html>
