<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:var(--em-font-sans); }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
  .sw { border-radius:8px; padding:14px; height:90px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid var(--em-border);}
  .sw .n { font-weight:600; font-size:13px; }
  .sw .h { font-family:var(--em-font-mono); font-size:11px; opacity:.8; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#2847E0; color:#fff; border-color:#2847E0;"><span class="n">Blue</span><span class="h">#2847E0</span></div>
    <div class="sw" style="background:#1C33B8; color:#fff; border-color:#1C33B8;"><span class="n">Blue deep</span><span class="h">#1C33B8</span></div>
    <div class="sw" style="background:#E8EBFD;"><span class="n">Blue soft</span><span class="h">#E8EBFD</span></div>
    <div class="sw" style="background:#111111; color:#fff; border-color:#111;"><span class="n">Ink</span><span class="h">#111111</span></div>
  </div>
</body>
</html>
